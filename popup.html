<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <title>QuickMark</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 430px;
      height: 620px;
      overflow-y: auto;
      background:
        linear-gradient(180deg,
          #fff7ed,
          #ffffff);
      font-family:
        Inter,
        PingFang SC,
        sans-serif;
      padding: 18px;
      font-synthesis: none;
      text-rendering: optimizeSpeed;
    }

    .top {

      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 18px;
    }

    .logo-wrap {

      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {

      width: 46px;
      height: 46px;

      border-radius: 16px;

      object-fit: cover;

      box-shadow:
        0 10px 25px rgba(249, 115, 22, .25);
    }

    .title {

      font-size: 22px;

      font-weight: 700;

      color: #18181b;
    }

    .sub {

      margin-top: 2px;

      font-size: 12px;

      color: #a1a1aa;
    }

    .count-badge {
      font-size: 12px;
      font-weight: 500;
      color: #a1a1aa;
      background: white;
      padding: 6px 12px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .04);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .columns {

      border: none;
      outline: none;

      background: white;

      color: #18181b;

      border-radius: 14px;

      padding: 10px 12px;

      box-shadow:
        0 4px 12px rgba(0, 0, 0, .05);
    }

    .search {
      width: 100%;
      height: 54px;
      border: none;
      outline: none;
      border-radius: 18px;
      background: #fff;
      padding: 0 18px;
      margin-bottom: 18px;
      font-size: 15px;
      color: #18181b;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, .06);
    }

    .search::placeholder {
      color: #a1a1aa;
    }

    .grid {

      display: grid;

      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      gap: 12px;
    }

    .card {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(0, 0, 0, .06);
      cursor: pointer;
      contain: layout style paint;
      content-visibility: auto;
      contain-intrinsic-size: auto 74px;
      transition:
        box-shadow .2s,
        border-color .2s;
      box-shadow:
        0 1px 4px rgba(0, 0, 0, .05);
    }

    .card:hover {
      border-color: rgba(249, 115, 22, .35);
      box-shadow:
        0 4px 16px rgba(249, 115, 22, .12);

      border-color:
        rgba(249, 115, 22, .3);
    }

    .icon {

      width: 46px;
      height: 46px;

      border-radius: 14px;

      background: white;

      object-fit: contain;

      padding: 7px;

      flex-shrink: 0;

      box-shadow:
        0 2px 10px rgba(0, 0, 0, .05);
    }

    .info {

      min-width: 0;

      flex: 1;
    }

    .name {

      font-size: 14px;

      font-weight: 600;

      color: #18181b;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;
    }

    .domain {

      margin-top: 4px;

      font-size: 11px;

      color: #a1a1aa;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;
    }

    .empty {

      text-align: center;

      padding: 80px 0;

      color: #a1a1aa;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-thumb {

      background: #fdba74;

      border-radius: 999px;
    }
  </style>

</head>

<body>

  <div class="top">

    <div class="logo-wrap">

      <img class="logo" src="icon.png">

      <div>

        <div class="title">
          QuickMark
        </div>

        <div class="sub">
          收藏启动器
        </div>

      </div>

    </div>

    <span id="total-count" class="count-badge">0</span>

    <select id="columns" class="columns">

      <option value="2">
        2列
      </option>

      <option value="3">
        3列
      </option>

      <option value="4">
        4列
      </option>

    </select>

  </div>

  <input id="search" class="search" placeholder="搜索收藏网站...">

  <div id="grid" class="grid"></div>

  <div id="empty" class="empty" style="display:none;">
    没有找到收藏网站
  </div>

  <script src="popup.js"></script>

</body>

</html>
